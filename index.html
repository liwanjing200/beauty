<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>透明感清单 · 变美产品全集</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     如何替换为真实图片：
     在下方 PRODUCTS 数据里，给某个产品加上 img 字段即可，例如：
        { cat:"skincare", tier:"core", brand:"Melano CC", name:"...", img:"images/melano.jpg" }
     img 可以是网络链接，也可以是放在本文件旁边的图片文件名。
     留空（不写 img）则显示磨砂占位图。
     ============================================================ */

  :root{
    --paper:#F4F6F4;
    --paper-2:#EAF0EC;
    --ink:#222826;
    --ink-soft:#5E6A64;
    --line:#D7DEDA;
    --card:#FFFFFFcc;
    --water:#5F8E82;        /* 必买 · 水绿 */
    --water-bg:#E2ECE7;
    --slate:#7E96A6;        /* 平价 · 雾蓝 */
    --slate-bg:#E6ECEF;
    --gold:#A9925E;         /* 奢华 · 香槟 */
    --gold-bg:#EEE8DA;
    --shadow:0 1px 2px rgba(34,40,38,.04),0 12px 32px -18px rgba(34,40,38,.18);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:"Noto Sans SC",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 80% -10%, #E6F0EB 0%, rgba(230,240,235,0) 55%),
      radial-gradient(100% 70% at 0% 0%, #EFEAE2 0%, rgba(239,234,226,0) 50%),
      var(--paper);
    background-attachment:fixed;
    font-weight:300;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{max-width:1120px;margin:0 auto;padding:0 22px;}

  /* ---------- Hero ---------- */
  header.hero{padding:72px 0 34px;}
  .eyebrow{
    font-size:11px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--water);font-weight:500;margin:0 0 18px;
  }
  h1.title{
    font-family:"Noto Serif SC",serif;font-weight:600;
    font-size:clamp(38px,7vw,68px);line-height:1.08;letter-spacing:.01em;
    margin:0 0 22px;
  }
  h1.title .thin{font-weight:400;color:var(--ink-soft);}
  .lede{
    max-width:640px;font-size:clamp(15px,2.2vw,17px);color:var(--ink-soft);
    margin:0 0 30px;font-weight:300;
  }
  .lede b{font-weight:500;color:var(--ink);}
  .stats{display:flex;gap:30px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:22px;}
  .stat .n{font-family:"Noto Serif SC",serif;font-size:30px;font-weight:600;line-height:1;}
  .stat .l{font-size:12px;color:var(--ink-soft);letter-spacing:.06em;margin-top:6px;}

  /* ---------- Controls ---------- */
  .controls{
    position:sticky;top:0;z-index:30;
    background:rgba(244,246,244,.82);backdrop-filter:blur(14px);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:14px 0;margin-top:30px;
  }
  .controls .wrap{display:flex;flex-direction:column;gap:12px;}
  .search{
    width:100%;border:1px solid var(--line);background:#fff;border-radius:0;
    padding:11px 14px;font-family:inherit;font-size:14px;color:var(--ink);
    font-weight:300;letter-spacing:.02em;
  }
  .search::placeholder{color:#9AA6A1;}
  .search:focus{outline:2px solid var(--water);outline-offset:-1px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{
    border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    font-family:inherit;font-size:12.5px;font-weight:400;letter-spacing:.04em;
    padding:7px 13px;cursor:pointer;border-radius:999px;transition:.18s;
  }
  .chip:hover{border-color:var(--water);color:var(--ink);}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}
  .chip.tier[aria-pressed="true"]{background:var(--water);border-color:var(--water);}
  .chip:focus-visible{outline:2px solid var(--water);outline-offset:2px;}
  .chip-label{font-size:11px;color:#9AA6A1;letter-spacing:.1em;align-self:center;margin-right:2px;}

  /* ---------- Sections ---------- */
  main{padding:44px 0 10px;}
  section.group{margin-bottom:18px;scroll-margin-top:120px;}
  .group-head{display:flex;align-items:baseline;gap:14px;margin:34px 0 20px;}
  .group-head h2{
    font-family:"Noto Serif SC",serif;font-weight:600;font-size:25px;margin:0;letter-spacing:.02em;
  }
  .group-head .en{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#9AA6A1;}
  .group-head .ct{margin-left:auto;font-size:12px;color:var(--ink-soft);}

  /* ---------- 细类小标题 ---------- */
  .sub-head{display:flex;align-items:baseline;gap:10px;margin:26px 0 13px;padding-bottom:7px;border-bottom:1px solid var(--line);}
  .sub-head h3{font-family:"Noto Serif SC",serif;font-weight:600;font-size:15px;margin:0;color:var(--ink);letter-spacing:.02em;white-space:nowrap;}
  .sub-head .fn{font-size:12px;color:var(--ink-soft);font-weight:300;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sub-head .sc{margin-left:auto;font-size:11px;color:#9AA6A1;white-space:nowrap;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px;}

  .card{
    background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);
    display:flex;flex-direction:column;overflow:hidden;
    opacity:0;transform:translateY(14px);transition:opacity .6s ease,transform .6s ease,border-color .2s;
  }
  .card.in{opacity:1;transform:none;}
  .card:hover{border-color:#B9C6C0;}

  .thumb{
    aspect-ratio:4/3;position:relative;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#fff 0%,var(--water-bg) 100%);
    border-bottom:1px solid var(--line);overflow:hidden;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .mono{
    font-family:"Noto Serif SC",serif;font-size:34px;font-weight:500;color:#fff;
    width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:rgba(95,142,130,.32);backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,.55);letter-spacing:.02em;
  }
  .ph-tag{position:absolute;bottom:8px;right:9px;font-size:9.5px;letter-spacing:.14em;color:#8B9A93;}

  .body{padding:15px 15px 16px;display:flex;flex-direction:column;gap:7px;flex:1;}
  .brand{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;}
  .name{font-family:"Noto Serif SC",serif;font-size:16px;font-weight:500;line-height:1.35;color:var(--ink);}
  .note{font-size:12.5px;color:var(--ink-soft);font-weight:300;line-height:1.55;flex:1;}
  .meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:8px;}
  .price{font-size:13px;font-weight:400;color:var(--ink);}
  .badge{font-size:10.5px;letter-spacing:.06em;padding:3px 8px;border-radius:999px;white-space:nowrap;font-weight:500;}
  .badge.core{background:var(--water-bg);color:#3C5C52;}
  .badge.value{background:var(--slate-bg);color:#445766;}
  .badge.lux{background:var(--gold-bg);color:#7A663B;}

  /* ---------- 已买按钮 / 已购状态 ---------- */
  .buy{
    margin-top:9px;width:100%;
    border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    font-family:inherit;font-size:12px;font-weight:400;letter-spacing:.08em;
    padding:8px 10px;cursor:pointer;border-radius:999px;transition:.18s;
  }
  .buy:hover{border-color:var(--water);color:var(--ink);}
  .buy:focus-visible{outline:2px solid var(--water);outline-offset:2px;}
  /* 已购：卡片其余内容轻微变暗，按钮保持高亮打勾 */
  .card.bought .thumb,
  .card.bought .brand,
  .card.bought .name,
  .card.bought .note,
  .card.bought .meta{opacity:.5;transition:opacity .25s;}
  .card.bought .buy{
    background:var(--water-bg);color:#3C5C52;border-color:var(--water);
    font-weight:500;opacity:1;
  }
  .card.bought .buy:hover{color:#2C463E;}

  .empty{display:none;text-align:center;padding:60px 0;color:var(--ink-soft);font-weight:300;}
  .empty.show{display:block;}

  footer{border-top:1px solid var(--line);margin-top:40px;padding:34px 0 60px;}
  footer .note-box{
    background:#fff;border:1px solid var(--line);padding:20px 22px;font-size:13px;color:var(--ink-soft);
    font-weight:300;line-height:1.7;
  }
  footer .note-box b{color:var(--ink);font-weight:500;}
  footer .sign{
    font-family:"Noto Serif SC",serif;font-size:17px;color:var(--ink);margin:24px 0 0;font-weight:500;
  }

  @media (max-width:600px){
    header.hero{padding:54px 0 26px;}
    .grid{grid-template-columns:1fr 1fr;gap:11px;}
    .thumb .mono{width:50px;height:50px;font-size:26px;}
    .name{font-size:14px;}
    .body{padding:12px;}
    .note{font-size:11.5px;}
    .group-head h2{font-size:21px;}
    .sub-head .fn{display:none;}
    .sub-head h3{font-size:14px;}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto;}
    .card{opacity:1;transform:none;transition:none;}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="wrap">
    <p class="eyebrow">A Curated Beauty Directory</p>
    <h1 class="title">透明感清单<br><span class="thin">变美产品全集</span></h1>
    <p class="lede">为「日本女人感」整理的一套完整产品——护肤、彩妆、头发、身体、香氛、口腔到仪器，按<b>品类</b>和<b>优先级</b>排好。真正的关键从来不是买更多，而是把<b>先买的这几样用满三个月</b>。</p>
    <div class="stats" id="stats"></div>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <input id="search" class="search" type="search" placeholder="搜索产品或品牌…" aria-label="搜索产品或品牌" />
    <div class="chips" id="catChips" role="group" aria-label="按品类筛选"></div>
    <div class="chips" id="tierChips" role="group" aria-label="按优先级筛选">
      <span class="chip-label">优先级</span>
    </div>
    <div class="chips">
      <span class="chip-label">显示</span>
      <button id="unboughtToggle" class="chip" type="button" aria-pressed="false">只看未买</button>
    </div>
  </div>
</div>

<main>
  <div class="wrap">
    <div id="sections"></div>
    <p class="empty" id="empty">没有符合的产品，换个关键词或清除筛选试试。</p>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="note-box">
      <b>关于图片</b>：每张卡片现在显示的是磨砂占位图（品牌首字母）。要换成真实产品图，打开本文件，在 <b>PRODUCTS</b> 数据里给对应产品加一行 <b>img:"图片链接或文件名"</b> 即可——网络链接或放在本文件旁的图片都行，留空则继续显示占位图。
    </div>
    <p class="sign">先买的那几样用满，再谈别的。脸的状态，七成是睡出来的。</p>
  </div>
</footer>

/* ====== 渲染 ====== */
let state = {cat:"all", tier:"all", q:"", unboughtOnly:false};

/* ====== 「已买」状态：localStorage 持久化，禁用时降级为本次内存 ====== */
const STORE_KEY = "beautyDir.bought.v1";
const keyOf = (p)=> p.brand + "|" + p.name;   // key = brand+name

let bought = (function loadBought(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(arr) ? arr : []);
  }catch(e){
    return new Set();   // localStorage 被禁用 / 解析失败：仅本次内存
  }
})();

let boughtSaveTimer;
function saveBought(){
  const items = [...bought];
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(items));
  }catch(e){ /* 被禁用时静默降级，不报错 */ }
  clearTimeout(boughtSaveTimer);
  boughtSaveTimer = setTimeout(()=>saveBoughtToSupabase(items), 250);
}

async function loadBoughtFromSupabase(){
  try{
    const res = await fetch(SUPABASE_BOUGHT_ENDPOINT + "&select=items&limit=1", {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
      },
    });
    if(!res.ok) throw new Error("Supabase bought state request failed: " + res.status);
    const rows = await res.json();
    const items = rows && rows[0] && Array.isArray(rows[0].items) ? rows[0].items : [];
    bought = new Set(items);
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(items)); }catch(e){}
    return true;
  }catch(e){
    console.warn("Using local bought state fallback", e);
    return false;
  }
}

async function saveBoughtToSupabase(items){
  try{
    const res = await fetch(SUPABASE_BOUGHT_ENDPOINT, {
      method: "PATCH",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        Prefer: "return=minimal",
      },
      body: JSON.stringify({items, updated_at: new Date().toISOString()}),
    });
    if(!res.ok) throw new Error("Supabase bought state save failed: " + res.status);
  }catch(e){
    console.warn("Bought state saved locally only", e);
  }
}
const isBought = (p)=> bought.has(keyOf(p));

function monogram(brand){
  const s = brand.replace(/[^A-Za-z\u4e00-\u9fa5]/g,"");
  const latin = brand.match(/[A-Za-z]/) ? brand.replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()
                                        : brand.slice(0,1);
  return latin || (s.slice(0,1)) || "·";
}

function placeholderHTML(brand){
  return `<span class="mono">${monogram(brand)}</span><span class="ph-tag">待配图</span>`;
}
// 图片加载失败时降级回磨砂占位图（全局，供 img 的 onerror 调用）
function imgFail(img){
  const thumb = img.closest(".thumb");
  if(thumb) thumb.innerHTML = placeholderHTML(img.getAttribute("data-mono-brand")||"");
}

function cardHTML(p){
  const t = TIERS[p.tier];
  const thumb = p.img
    ? `<div class="thumb"><img src="${p.img}" alt="${p.brand} ${p.name}" data-mono-brand="${p.brand}" onerror="imgFail(this)"></div>`
    : `<div class="thumb">${placeholderHTML(p.brand)}</div>`;
  const b = isBought(p);
  return `<article class="card${b?' bought':''}" data-cat="${p.cat}" data-tier="${p.tier}" data-key="${keyOf(p)}" data-q="${(p.brand+' '+p.name).toLowerCase()}">
    ${thumb}
    <div class="body">
      <span class="brand">${p.brand}</span>
      <span class="name">${p.name}</span>
      <p class="note">${p.note}</p>
      <div class="meta">
        <span class="price">${p.price}</span>
        <span class="badge ${t.cls}">${t.zh}</span>
      </div>
      <button class="buy" type="button" aria-pressed="${b?'true':'false'}">${b?'✓ 已入手':'○ 标记已买'}</button>
    </div>
  </article>`;
}

function render(immediate){
  const host = document.getElementById("sections");
  host.innerHTML = "";
  let total = 0;
  CATS.forEach(c=>{
    if(state.cat!=="all" && state.cat!==c.id) return;
    const items = PRODUCTS.filter(p=>
      p.cat===c.id &&
      (state.tier==="all" || p.tier===state.tier) &&
      (!state.unboughtOnly || !isBought(p)) &&
      (state.q==="" || (p.brand+" "+p.name).toLowerCase().includes(state.q))
    );
    if(!items.length) return;
    total += items.length;
    const sec = document.createElement("section");
    sec.className="group";
    sec.id="g-"+c.id;
    let inner = `<div class="group-head">
        <h2>${c.zh}</h2><span class="en">${c.en}</span><span class="ct">${items.length} 件</span>
      </div>`;
    // 按细类分组渲染：SUBS 给定顺序，未列出的细类排在后面
    const order = (SUBS[c.id]||[]).slice();
    [...new Set(items.map(p=>p.sub).filter(Boolean))].forEach(sid=>{
      if(!order.some(s=>s.id===sid)) order.push({id:sid,fn:""});
    });
    order.forEach(sb=>{
      const its = items.filter(p=>p.sub===sb.id);
      if(!its.length) return;
      inner += `<div class="sub-head"><h3>${sb.id}</h3>${sb.fn?`<span class="fn">${sb.fn}</span>`:""}<span class="sc">${its.length} 件</span></div>
      <div class="grid">${its.map(cardHTML).join("")}</div>`;
    });
    const noSub = items.filter(p=>!p.sub);
    if(noSub.length) inner += `<div class="grid">${noSub.map(cardHTML).join("")}</div>`;
    sec.innerHTML = inner;
    host.appendChild(sec);
  });
  document.getElementById("empty").classList.toggle("show", total===0);
  if(immediate){ document.querySelectorAll(".card").forEach(c=>c.classList.add("in")); }
  else revealObserve();
}

/* 点击「标记已买 / 已入手」（事件委托，渲染后仍生效） */
document.getElementById("sections").addEventListener("click",(e)=>{
  const btn = e.target.closest(".buy");
  if(!btn) return;
  const card = btn.closest(".card");
  const k = card.dataset.key;
  const nowBought = !bought.has(k);
  if(nowBought) bought.add(k); else bought.delete(k);
  saveBought();
  card.classList.toggle("bought", nowBought);
  btn.setAttribute("aria-pressed", nowBought?"true":"false");
  btn.textContent = nowBought ? "✓ 已入手" : "○ 标记已买";
  // 「只看未买」模式下，刚标记已买的卡片需要从列表中隐去
  if(state.unboughtOnly && nowBought){ render(true); }
  updateProgress();
});

/* 滚动渐入 */
let io;
function revealObserve(){
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const cards = document.querySelectorAll(".card");
  if(reduce){ cards.forEach(c=>c.classList.add("in")); return; }
  if(io) io.disconnect();
  io = new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
  },{threshold:.08, rootMargin:"0px 0px -40px 0px"});
  cards.forEach(c=>io.observe(c));
}

/* 控件 */
function buildChips(){
  const catBox = document.getElementById("catChips");
  const mk=(label,val,group,active)=>{
    const b=document.createElement("button");
    b.className="chip"+(group==="tier"?" tier":"");
    b.textContent=label; b.dataset.val=val; b.dataset.group=group;
    b.setAttribute("aria-pressed", active?"true":"false");
    b.addEventListener("click",()=>{
      state[group]=val;
      document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(x=>x.setAttribute("aria-pressed","false"));
      b.setAttribute("aria-pressed","true");
      render();
    });
    return b;
  };
  catBox.appendChild(mk("全部","all","cat",true));
  CATS.forEach(c=>catBox.appendChild(mk(c.zh,c.id,"cat",false)));

  const tierBox = document.getElementById("tierChips");
  tierBox.appendChild(mk("全部","all","tier",true));
  Object.entries(TIERS).forEach(([k,v])=>tierBox.appendChild(mk(v.zh,k,"tier",false)));
}

document.getElementById("search").addEventListener("input",(e)=>{
  state.q = e.target.value.trim().toLowerCase(); render();
});

/* stats */
function stats(){
  const el=document.getElementById("stats");
  const core = PRODUCTS.filter(p=>p.tier==="core").length;
  const data=[[PRODUCTS.length,"件精选产品"],[CATS.length,"个品类"],[core,"件必买地基"]];
  el.innerHTML = data.map(d=>`<div class="stat"><div class="n">${d[0]}</div><div class="l">${d[1]}</div></div>`).join("")
    + `<div class="stat" id="progStat"></div>`;
  updateProgress();
}

/* 已入手进度，随勾选实时更新 */
function updateProgress(){
  const el=document.getElementById("progStat");
  if(!el) return;
  const have = PRODUCTS.reduce((n,p)=> n + (isBought(p)?1:0), 0);
  el.innerHTML = `<div class="n">${have} / ${PRODUCTS.length}</div><div class="l">已入手 / 共</div>`;
}

/* 「只看未买」开关 */
const ubt = document.getElementById("unboughtToggle");
ubt.addEventListener("click",()=>{
  state.unboughtOnly = !state.unboughtOnly;
  ubt.setAttribute("aria-pressed", state.unboughtOnly?"true":"false");
  render();
});


async function loadProductsFromSupabase(){
  try{
    const res = await fetch(SUPABASE_PRODUCTS_ENDPOINT, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY,
      },
    });
    if(!res.ok) throw new Error("Supabase products request failed: " + res.status);
    const rows = await res.json();
    if(!Array.isArray(rows) || !rows.length) return false;
    PRODUCTS.splice(0, PRODUCTS.length, ...rows.map((p)=>({
      cat:p.cat, sub:p.sub || "", tier:p.tier, brand:p.brand, name:p.name,
      price:p.price || "", note:p.note || "", img:p.img || "",
    })));
    return true;
  }catch(e){
    console.warn("Using bundled beauty products fallback", e);
    return false;
  }
}

async function startBeautyPage(){
  if (typeof applyBeautyRefresh === "function") { try { applyBeautyRefresh(); } catch(e) { console.error(e); } }
  await loadProductsFromSupabase();
  await loadBoughtFromSupabase();
  buildChips(); stats(); render();
}

startBeautyPage();
