name: Patch beauty Supabase key

on:
  push:
    paths:
      - .github/workflows/patch-beauty-key.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch key
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let s = fs.readFileSync(path, 'utf8');
          const oldKey = 'sb_publishable_zDXnDnWE665dD9kMmSqxOQ_U0Y_V5ib';
          const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptZnV1anllb2RoamhneGV6cXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Mjc4NTksImV4cCI6MjA5NzUwMzg1OX0.4BtqkPjxJ10TLwQ3yL7gjMgAFWEBBMqzoL2N2WI0Zw4';
          s = s.replaceAll(oldKey, anonKey);
          if (!s.includes(anonKey)) throw new Error('anon key patch did not apply');
          fs.writeFileSync(path, s);
          NODE
      - name: Commit patch
        run: |
          if git diff --quiet index.html; then
            echo "No index.html changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Use Supabase anon key for beauty memory"
          git push
